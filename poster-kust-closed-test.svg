  </defs>
  <rect width="1080" height="1920" rx="48" fill="url(#bg)"/>
  <circle cx="928" cy="192" r="250" fill="#FFD7BB" fill-opacity="0.7"/>
  <circle cx="154" cy="1504" r="260" fill="#FFE9D3" fill-opacity="0.9"/>
  <rect x="70" y="74" width="940" height="1772" rx="40" fill="white" fill-opacity="0.72" stroke="#EFD9C5"/>
  <rect x="126" y="132" width="360" height="76" rx="38" fill="#FFF5EC" stroke="#F3CBA9"/>
  <text fill="#A5481B" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" letter-spacing="3">
