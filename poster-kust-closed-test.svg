<svg width="1080" height="1920" viewBox="0 0 1080 1920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="150" y1="90" x2="910" y2="1820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF4E8"/>
      <stop offset="1" stop-color="#FFFDFC"/>
    </linearGradient>
    <linearGradient id="accent" x1="237" y1="239" x2="830" y2="1235" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E36C2C"/>
      <stop offset="1" stop-color="#F5A25A"/>
