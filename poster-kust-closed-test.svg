  </text>
  <text fill="#201915" font-family="Segoe UI, Arial, sans-serif" font-size="92" font-weight="800">
    <tspan x="126" y="336">Practice Chinese</tspan>
    <tspan x="126" y="432">with HSK Quiz App</tspan>
  </text>
  <text fill="#6A5B51" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="500">
