  <text fill="#A5481B" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">
    <tspan x="176" y="686">Android only</tspan>
  </text>
  <text fill="#A5481B" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">
    <tspan x="484" y="686">Join the tester group first</tspan>
  </text>
  <rect x="126" y="772" width="828" height="360" rx="36" fill="#1F1815"/>
  <text fill="#FFF3EB" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="800">
